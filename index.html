<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <title>Well Surface Diagram</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { margin:0; font:14px/1.4 system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background:#fff; color:#111; }
    header { padding:16px 20px; border-bottom:1px solid #e5e7eb; display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
    header h1 { margin:0; font-size:18px; }
    main { padding:16px 20px; display:flex; gap:20px; align-items:flex-start; }
    .svgWrap { overflow:auto; border:1px solid #e5e7eb; border-radius:8px; background:#fafafa; min-width:920px; min-height:540px; }
    .side { flex:1; min-width:320px; }
    .btn { display:inline-block; padding:8px 12px; border:1px solid #d1d5db; border-radius:6px; cursor:pointer; background:#fff; font-size:14px; }
    select.btn { appearance:auto; }
    .hint { color:#6b7280; }
  </style>
</head>
<body>
  <header>
    <h1>Well Surface Diagram</h1>
    <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:#374151;">
      Well:
      <select id="wellSelect" class="btn">
        <option value="well_data.json">EB-33H</option>
        <option value="well_data_EB3H.json">EB-03H</option>
        <option value="well_data_doublecompletionwell.json">Double Completion Well</option>
      </select>
    </label>
  </header>

  <main>
    <div class="svgWrap" id="app"></div>
    <div class="side">
      <h3>Azioni</h3>
      <button class="btn" id="downloadBtn">Scarica SVG</button>
      <p class="hint" style="margin-top:10px">
        Etichette generate da <code>valvedata.dimension</code> e <code>valvedata.working_pressure</code>; posizionamento guidato da
        <code>xmastreevalvetype.code</code> e <code>wellheadvalveside.code</code>.
      </p>
    </div>
  </main>

  <script type="module" src="./main.js"></script>
</body>
</html>
